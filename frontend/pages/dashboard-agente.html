<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Agente</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <strong>Agente: <span id="nomeUsuario"></span></strong>
      <button onclick="logout()">Sair</button>
    </header>
    <main class="container">
      <section class="card">
        <h2>Pedidos para análise</h2>
        <table class="table"><thead><tr><th>ID</th><th>Cliente</th><th>Automóvel</th><th>Status</th><th>Ações</th></tr></thead><tbody id="pedidosBody"></tbody></table>
      </section>
      <section class="card">
        <h2>Análise financeira</h2>
        <form onsubmit="avaliarPedido(event)">
          <div class="row"><div><label>ID do pedido</label><input id="pedido_id" type="number" required /></div><div><label>Decisão</label><select id="aprovado" required><option value="true">Aprovar</option><option value="false">Reprovar</option></select></div></div>
          <label>Descrição da análise</label><textarea id="analise" required></textarea>
          <button type="submit">Registrar análise</button>
        </form>
      </section>
      <section class="card">
        <h2>Contrato de crédito (apenas banco)</h2>
        <form onsubmit="associarCredito(event)">
          <div class="row"><div><label>ID do contrato</label><input id="contrato_id" type="number" required /></div><div><label>Valor</label><input id="valor_credito" type="number" step="0.01" required /></div></div>
          <div class="row"><div><label>Juros (%)</label><input id="juros" type="number" step="0.01" required /></div><div><label>Parcelas</label><input id="parcelas" type="number" required /></div></div>
          <button type="submit">Associar crédito</button>
        </form>
      </section>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/agente.js"></script>
  </body>
</html>
