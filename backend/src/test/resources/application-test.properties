# Porta aleatória evita falha quando 8080 já está em uso (ex.: API rodando no dev)
micronaut.server.port=-1

datasources.default.url=jdbc:h2:mem:testDb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
datasources.default.username=sa
datasources.default.password=
datasources.default.driver-class-name=org.h2.Driver

jpa.default.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
jpa.default.properties.hibernate.hbm2ddl.auto=create-drop
jpa.default.entity-scan.packages=com.example.aluguel.model

micronaut.security.authentication=bearer
micronaut.security.token.jwt.signatures.secret.generator.secret=testSecretTestSecretTestSecretTestSecretTest12
micronaut.security.token.jwt.generator.access-token.expiration=PT1H
micronaut.security.endpoints.login.enabled=true
micronaut.security.endpoints.login.path=/api/auth/login

app.dev.seed.enabled=false
