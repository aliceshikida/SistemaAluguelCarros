micronaut:
  application:
    name: sistemaAluguelCarros
  server:
    port: 8080
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins:
            - http://localhost:5173
            - http://127.0.0.1:5173
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          allowed-headers:
            - Authorization
            - Content-Type
            - Accept
          exposed-headers:
            - Authorization
          max-age: 3600
datasources:
  default:
    url: jdbc:h2:mem:devDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
jpa:
  default:
    entity-scan:
      packages:
        - com.example.sistemagestaocarros.models
    properties:
      # Chaves planas: o formato aninhado nem sempre vira hibernate.hbm2ddl.auto e o schema não é criado (500 no login/cadastro).
      hibernate.hbm2ddl.auto: update
      hibernate.show_sql: true
app:
  jwt:
    secret: chave-super-secreta-minimo-32-caracteres-para-hs256!!
    expiration-seconds: 86400