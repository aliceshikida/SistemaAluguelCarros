micronaut:
  application:
    name: sistemaAluguelCarros
  server:
    cors:
      enabled: true
      configurations:
        web:
          allowedOrigins:
            - "http://localhost:5173"

datasources:
  default:
    url: jdbc:h2:mem:devDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''
    schema-generate: CREATE_DROP

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: true

app:
  jwt:
    secret: "chave-super-secreta-minimo-32-caracteres-para-hs256!!"
    expiration-seconds: 86400