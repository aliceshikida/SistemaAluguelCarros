micronaut.application.name=sistema-aluguel-carros
micronaut.server.port=8080

micronaut.security.authentication=bearer
micronaut.security.token.jwt.signatures.secret.generator.secret=${JWT_SECRET:changeMeChangeMeChangeMeChangeMeChangeMeChangeMeChangeMeChangeMe12}
micronaut.security.token.jwt.generator.access-token.expiration=PT8H
micronaut.security.endpoints.login.enabled=true
micronaut.security.endpoints.login.path=/api/auth/login

micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.default.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
micronaut.server.cors.configurations.default.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
micronaut.server.cors.configurations.default.allowed-headers=*
micronaut.server.cors.configurations.default.allow-credentials=true

# H2 2.x: não use DB_CLOSE_ON_EXIT=FALSE junto com AUTO_SERVER (erro 50100). AUTO_SERVER permite outro processo/tool acessar o mesmo arquivo.
datasources.default.url=jdbc:h2:file:./data/aluguel-dev;LOCK_TIMEOUT=10000;AUTO_SERVER=TRUE
datasources.default.username=sa
datasources.default.password=
datasources.default.driver-class-name=org.h2.Driver

jpa.default.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
jpa.default.properties.hibernate.hbm2ddl.auto=update
jpa.default.entity-scan.packages=com.example.aluguel.model

jackson.serialization-inclusion=non_absent

# Dados de demonstração ao subir a API (usuários clientedemo / empresademo / bancodemo). Desligue em produção: false
app.dev.seed.enabled=true
